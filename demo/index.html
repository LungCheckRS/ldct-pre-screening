<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lung Cancer Screening Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 650px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
    }
    label {
      display: block;
      margin-top: 15px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      margin-top: 20px;
      padding: 12px;
      font-size: 16px;
      width: 100%;
    }
    #result {
      margin-top: 25px;
      font-weight: bold;
      font-size: 18px;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>Lung Cancer Screening Eligibility Checker</h1>

<p>This tool uses guidelines from the U.S. Preventive Services Task Force (USPSTF). It is not a medical diagnosis.</p>

<label>Age:</label>
<input type="number" id="age">

<label>Smoking Status:</label>
<select id="smokeStatus">
  <option value="never">Never smoked</option>
  <option value="current">Current smoker</option>
  <option value="former">Former smoker</option>
</select>

<label>Years smoked:</label>
<input type="number" id="years">

<label>Cigarettes per day:</label>
<input type="number" id="cigs">

<label>If you quit, how many years ago?</label>
<input type="number" id="quitYears" placeholder="0 if still smoking">

<label>Location (State):</label>
<input type="text" id="location" placeholder="e.g., Texas">

<label>Type of Area:</label>
<select id="areaType">
  <option>Urban</option>
  <option>Suburban</option>
  <option>Rural</option>
</select>

<label>Do you have access to a primary care provider?</label>
<select id="access">
  <option>Yes</option>
  <option>No</option>
  <option>Not sure</option>
</select>

<button onclick="checkEligibility()">Check Eligibility</button>

<div id="result"></div>

<script>
function checkEligibility() {
  let age = parseInt(document.getElementById("age").value);
  let status = document.getElementById("smokeStatus").value;
  let years = parseFloat(document.getElementById("years").value);
  let cigs = parseFloat(document.getElementById("cigs").value);
  let quitYears = parseFloat(document.getElementById("quitYears").value);

  let location = document.getElementById("location").value;
  let areaType = document.getElementById("areaType").value;
  let access = document.getElementById("access").value;

  let packsPerDay = cigs / 20;
  let packYears = years * packsPerDay;

  let eligible = false;

  if (
    age >= 50 && age <= 80 &&
    packYears >= 20 &&
    (status === "current" || (status === "former" && quitYears <= 15))
  ) {
    eligible = true;
  }

  let resultDiv = document.getElementById("result");

  if (eligible) {
    resultDiv.style.backgroundColor = "#d4edda";
    resultDiv.innerHTML = `
      ✅ You may be eligible for lung cancer screening (LDCT).<br><br>
      Pack-years: ${packYears.toFixed(1)}<br>
      Location: ${location}<br>
      Area: ${areaType}<br>
      Primary Care Access: ${access}<br><br>
      Early detection reduces mortality by ~20%. Please consult a healthcare provider.
    `;
  } else {
    resultDiv.style.backgroundColor = "#f8d7da";
    resultDiv.innerHTML = `
      ❌ You may not meet current screening criteria.<br><br>
      Pack-years: ${packYears.toFixed(1)}<br>
      Location: ${location}<br>
      Area: ${areaType}<br>
      Primary Care Access: ${access}<br><br>
      If you have concerns, consult a healthcare provider.
    `;
  }
}
</script>

</body>
</html>
